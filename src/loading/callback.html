<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>Redirecting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid var(--track, #e5e5ea);
      border-top-color: var(--accent, #007aff);
      animation: spin 0.8s linear infinite;
      transition: border-color 0.4s;
    }
    .spinner.success {
      --accent: #34c759;
      --track: #d1f2d9;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner" id="s"></div>
  <script>
    (function () {
      var search = location.search;
      if (!search) return;
      var query = search.charAt(0) === '?' ? search.slice(1) : search;
      var pairs = query.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var eq = pairs[i].indexOf('=');
        if (eq === -1) continue;
        if (decodeURIComponent(pairs[i].slice(0, eq)) !== 'or') continue;
        var url = decodeURIComponent(pairs[i].slice(eq + 1));
        if (url) {
          document.getElementById('s').className = 'spinner success';
          window.location.href = url;
        }
        break;
      }
    })();
  </script>
</body>
</html>
