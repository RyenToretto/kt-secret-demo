<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>正在跳转...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid var(--track, #e5e5ea);
      border-top-color: var(--accent, #007aff);
      animation: spin 0.8s linear infinite;
      transition: border-color 0.4s;
    }
    .spinner.success {
      --accent: #34c759;
      --track: #d1f2d9;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner" id="s"></div>
  <!-- __KT_SECRET_INLINE__ -->
  <script>
    (function () {
      var KEY = '1234567890654321';
      var s = location.search;
      if (!s) return;
      var q = s.charAt(0) === '?' ? s.slice(1) : s;
      var pairs = q.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var eq = pairs[i].indexOf('=');
        if (eq === -1) continue;
        if (decodeURIComponent(pairs[i].slice(0, eq)) !== 'rp') continue;
        try {
          var url = DoWebSecret.decode(decodeURIComponent(pairs[i].slice(eq + 1)), { key: KEY });
          if (url && url.indexOf('http') === 0) {
            document.getElementById('s').className = 'spinner success';
            window.location.replace(url);
          }
        } catch (e) {}
        break;
      }
    })();
  </script>
</body>
</html>
